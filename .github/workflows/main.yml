name: Gerar APK Sensi VIP
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixando seu codigo
        uses: actions/checkout@v4

      - name: Transformar em App Android
        uses: simple-elf/pwa-to-apk@v2.0
        with:
          # URL do seu site (pode ser o link do seu proprio github pages se tiver)
          url: "https://jotap21.github.io/sensi-vip-app/"
          name: "Sensi VIP"

      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: Instalador-Sensi-VIP
          path: ./*.apk