name: Criar APK Direto
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK
        uses: Gear-Labs/pwa-to-apk@v1
        with:
          # Link do seu site (pode ser o do Vercel que você já tem)
          url: "https://sensi-vip.vercel.app"
          name: "Sensi VIP"
          icon: "https://via.placeholder.com/512.png"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App-Sensi-VIP
          path: output/*.apk