name: Gerar APK Sensi VIP
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixando seu codigo
        uses: actions/checkout@v4 # Atualizado para v4

      - name: Configurando Ambiente
        uses: actions/setup-java@v4 # Atualizado para v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Transformando HTML em APK
        run: |
          npm install -g @bubblewrap/cli
          bubblewrap init --manifest=https://sensi-vip.vercel.app/manifest.json --noprompt || true
          bubblewrap build --noprompt

      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4 # ESSA É A LINHA QUE ESTAVA DANDO ERRO
        with:
          name: Instalador-Sensi-VIP
          path: ./*.apk